name: Release addon

# Buduje paczke GigaKloce.zip (folder GigaKloce/ w srodku) z plikow wymienionych w .toc.
# Trigger: push taga vX.Y  ->  GitHub Release z zalaczonym zipem.
#          recznie (workflow_dispatch) -> zip jako artifact w zakladce Actions.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build GigaKloce package from .toc
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          echo "ref=${GITHUB_REF_NAME}  version=${VERSION}"
          rm -rf build
          mkdir -p build/GigaKloce
          cp GigaKloce.toc build/GigaKloce/
          # skopiuj kazdy plik wymieniony w .toc (pomija ## metadane i puste linie)
          while IFS= read -r line || [ -n "$line" ]; do
            line="${line%$'\r'}"
            case "$line" in ''|\#*) continue ;; esac
            if [ -f "$line" ]; then
              mkdir -p "build/GigaKloce/$(dirname "$line")"
              cp "$line" "build/GigaKloce/$line"
              echo "  + $line"
            else
              echo "  ! BRAK pliku z .toc: $line" >&2
              exit 1
            fi
          done < GigaKloce.toc
          # podbij Version w .toc z taga (tylko gdy tag zaczyna sie od v)
          if [ "${VERSION}" != "${GITHUB_REF_NAME}" ]; then
            sed -i "s/^## Version:.*/## Version: ${VERSION}\r/" build/GigaKloce/GigaKloce.toc
            echo "ustawiono ## Version: ${VERSION}"
          fi
          cd build
          zip -r ../GigaKloce.zip GigaKloce
          cd ..
          echo "=== zawartosc paczki ==="
          unzip -l GigaKloce.zip

      - name: Upload artifact (zawsze)
        uses: actions/upload-artifact@v4
        with:
          name: GigaKloce
          path: GigaKloce.zip

      - name: Create release (tylko dla tagow)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: GigaKloce.zip
          generate_release_notes: true
