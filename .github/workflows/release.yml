name: Release addon

# Buduje paczke GigaKloce.zip (folder GigaKloce/ w srodku) ze WSZYSTKICH sledzonych plikow
# (toc + lua + assets/ + wipe.ogg ...) oprocz meta-plikow repo (README/TODO/.github/.vscode/.gitignore).
# Trigger: push taga vX.Y  ->  GitHub Release z zalaczonym zipem.
#          recznie (workflow_dispatch) -> zip jako artifact w zakladce Actions.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build GigaKloce package
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          echo "ref=${GITHUB_REF_NAME}  version=${VERSION}"
          rm -rf build
          mkdir -p build/GigaKloce
          # wez WSZYSTKIE sledzone pliki oprocz meta-plikow repo; zachowaj strukture katalogow
          git ls-files | while IFS= read -r f; do
            case "$f" in
              .github/*|.vscode/*|.gitignore|README.md|TODO.md|RELEASE_NOTES.md) continue ;;
            esac
            mkdir -p "build/GigaKloce/$(dirname "$f")"
            cp "$f" "build/GigaKloce/$f"
            echo "  + $f"
          done
          # podbij Version w .toc z taga (tylko gdy tag zaczyna sie od v)
          if [ "${VERSION}" != "${GITHUB_REF_NAME}" ]; then
            sed -i "s/^## Version:.*/## Version: ${VERSION}\r/" build/GigaKloce/GigaKloce.toc
            echo "ustawiono ## Version: ${VERSION}"
          fi
          cd build
          zip -r ../GigaKloce.zip GigaKloce
          cd ..
          echo "=== zawartosc paczki ==="
          unzip -l GigaKloce.zip

      # Artefakt: wrzucamy FOLDER (nie gotowy zip!), bo GitHub i tak pakuje artefakt w zip.
      # path=build (zawiera tylko GigaKloce/) -> pobrany artefakt to jeden zip z GigaKloce/ w srodku.
      - name: Upload artifact (zawsze)
        uses: actions/upload-artifact@v4
        with:
          name: GigaKloce
          path: build/

      - name: Create release (tylko dla tagow)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: GigaKloce.zip
          body_path: RELEASE_NOTES.md       # opis Release = kuratorowane notki
          generate_release_notes: true      # + auto-lista commitow pod spodem
